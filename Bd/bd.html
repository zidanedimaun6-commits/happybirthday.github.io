<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: Arial, sans-serif;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: float 3s ease-in-out infinite;
}

h1 {
    color: #ff4081;
    font-size: 3rem;
    margin-bottom: 10px;
}

p {
    color: #555;
    font-size: 1.2rem;
}

.cake {
    font-size: 80px;
    margin-bottom: 15px;
}

@keyframes float {
    0%, 100% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-10px);
    }
}
</style>
</head>

<body>

<div class="card">
    <div class="cake">🎂</div>
    <h1>Happy Birthday Kelsey🎂!</h1>
    <p>Wishing you happiness, success, and lots of cake today!</p>
    <p>🎉 Have an amazing birthday! 🎉</p>
</div>

</body>
</html>
