<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
           
    <div class="balloon b1">🎈</div>
 <div class="balloon b2">🎈</div>
 <div class="balloon b3">🎈</div>

 <div class="confetti"></div>
 
 <div class="card">
    <div class="cake">🎂</div>

    <h1>Happy Birthday Kelsey 🎂!</h1>

    <p>Wishing you happiness, success, and lots of cake today!</p>

    <p>🎉 Have an amazing birthday! 🎉</p>

    <button onclick="showMessage()">
        💌 Open Birthday Message
    </button>

    <div id="birthdayMessage">
        <p>
            Happy Birthday Kelsey! ❤️<br>
            I hope all your wishes come true and that you have
            an amazing day filled with happiness and love.
        </p>
    </div>
</div>

<script>
function showMessage() {
    document.getElementById("birthdayMessage").style.display = "block";
}
</script>
</body>
</html>
